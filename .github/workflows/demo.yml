# Deploys the public demo to GitHub Pages: the real frontend with the
# backend running in the visitor's browser (VITE_DEMO=1). Every visitor
# gets their own sandbox in localStorage that re-seeds after 24 hours —
# there is no shared server and no shared state to clean up.
#
# One-time setup: repo Settings -> Pages -> Source: "GitHub Actions".
name: demo

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/demo.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Requires one-time setup: Settings -> Pages -> Source: GitHub Actions.
      # (The workflow token cannot create the Pages site itself.)
      - uses: actions/configure-pages@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
        working-directory: web
      # Mirror CI's frontend checks so a red push can't update the public
      # demo while racing CI on the same commit.
      - run: bun run lint
        working-directory: web
      - run: bun run fmt:check
        working-directory: web
      - run: bun test
        working-directory: web
      - run: bun run build
        working-directory: web
        env:
          VITE_DEMO: "1"
          VITE_BASE: /hearth/
      - uses: actions/upload-pages-artifact@v5
        with:
          path: web/dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Pages deployments fail transiently ("try again later") often enough
      # that a built-in second attempt beats a human clicking re-run.
      - id: deployment
        uses: actions/deploy-pages@v5
        continue-on-error: true
      - id: retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v5
