name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  binaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # git-cliff needs full history to diff against the previous tag

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: oven-sh/setup-bun@v2

      - name: Build frontend
        run: |
          cd web
          bun install --frozen-lockfile
          VITE_BUILD_ID=${{ github.ref_name }} bun run build
          bun scripts/compress.mjs

      - name: Cross-compile binaries
        run: |
          mkdir -p release
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            os=${target%/*}; arch=${target#*/}
            out="hearth-${{ github.ref_name }}-${os}-${arch}"
            CGO_ENABLED=0 GOOS=$os GOARCH=$arch \
              go build -trimpath -ldflags="-s -w" -o "release/$out/hearth" ./cmd/hearth
            cp .env.example "release/$out/"
            tar -czf "release/$out.tar.gz" -C release "$out"
            rm -r "release/$out"
          done
          (cd release && shasum -a 256 *.tar.gz > SHA256SUMS)

      - name: Changelog from conventional commits (previous tag → this one)
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: release-notes.md

      # generate_release_notes stays on: GitHub appends the compare link and
      # new-contributor mentions after the git-cliff body.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: release-notes.md
          files: |
            release/*.tar.gz
            release/SHA256SUMS
          generate_release_notes: true

      # Announced from here rather than a `release:` trigger elsewhere:
      # releases published with GITHUB_TOKEN never fire events for other
      # workflows. Non-fatal — a broken webhook must not fail the release.
      - name: Prepare Discord release notes
        id: discord-notes
        continue-on-error: true
        run: |
          {
            echo 'notes<<TONK_NOTES_EOF'
            # Discord embeds don't render markdown headers; bold them instead.
            sed -E 's/^#{1,4} +(.*)/**\1**/' release-notes.md
            echo TONK_NOTES_EOF
          } >> "$GITHUB_OUTPUT"

      - name: Announce release on Discord
        continue-on-error: true
        uses: zandoh/tonk@v2
        with:
          webhook-url: ${{ secrets.TONK_DISCORD_WEBHOOK }}
          title: 🚀 Hearth ${{ github.ref_name }} released
          description: ${{ steps.discord-notes.outputs.notes }}
          url: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}
          color: "5793266"
          username: Hearth Releases

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            BUILD_ID=${{ github.ref_name }}
          tags: |
            ghcr.io/zandoh/hearth:${{ github.ref_name }}
            ghcr.io/zandoh/hearth:latest
          labels: |
            org.opencontainers.image.source=https://github.com/zandoh/hearth
