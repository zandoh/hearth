# Posts CI/CD status to Discord (secret: DISCORD_WEBHOOK).
#
# Failure and back-to-green alerts arrive via workflow_run rather than steps
# inside each workflow, so a run that dies before its own notify step would
# have executed still reports. Release announcements live in release.yml
# instead: releases published with the workflow GITHUB_TOKEN never emit a
# `release` event to other workflows, so an `on: release` job here would
# silently never fire.
#
# Pull-request runs are excluded on purpose — red PRs are part of iterating.
# To include them, drop the `event != 'pull_request'` condition.
name: Discord notifications

on:
  workflow_run:
    workflows: [CI, Release, demo]
    types: [completed]

permissions:
  actions: read

jobs:
  failure:
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Post failure to Discord
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK }}
          WF_NAME: ${{ github.event.workflow_run.name }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          COMMIT_MSG: ${{ github.event.workflow_run.head_commit.message }}
          SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          jq -n \
            --arg title "❌ ${WF_NAME} failed on ${BRANCH}" \
            --arg desc "$(printf '%s' "$COMMIT_MSG" | head -n1) (\`${SHA:0:7}\`)" \
            --arg url "$RUN_URL" \
            '{username: "Hearth CI",
              embeds: [{title: $title, description: $desc, url: $url,
                        color: 15548997, timestamp: (now | todate)}]}' \
          | curl -sSf -H 'Content-Type: application/json' -d @- "$WEBHOOK_URL"

  # Only fires when the previous completed run of the same workflow on the
  # same branch was a failure — one "back to green" per incident, not one
  # per green push.
  recovery:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Post recovery to Discord if previous run failed
        env:
          GH_TOKEN: ${{ github.token }}
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK }}
          WF_ID: ${{ github.event.workflow_run.workflow_id }}
          WF_NAME: ${{ github.event.workflow_run.name }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          RUN_NUMBER: ${{ github.event.workflow_run.run_number }}
        run: |
          prev=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/${WF_ID}/runs?branch=${BRANCH}&status=completed&per_page=20" \
            --jq "[.workflow_runs[] | select(.run_number < ${RUN_NUMBER})]
                  | sort_by(.run_number) | last | .conclusion // empty")
          [ "$prev" = "failure" ] || exit 0
          jq -n \
            --arg title "✅ ${WF_NAME} back to green on ${BRANCH}" \
            --arg url "$RUN_URL" \
            '{username: "Hearth CI",
              embeds: [{title: $title, url: $url,
                        color: 5763719, timestamp: (now | todate)}]}' \
          | curl -sSf -H 'Content-Type: application/json' -d @- "$WEBHOOK_URL"
