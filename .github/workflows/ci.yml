name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: oven-sh/setup-bun@v2

      - name: Frontend deps
        run: cd web && bun install --frozen-lockfile

      - name: Frontend lint, format, tests
        run: |
          cd web
          bun run lint
          bun run fmt:check
          bun test

      - name: Build binary (embeds frontend)
        run: make build

      - name: gofmt
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)

      - name: go vet
        run: go vet ./...

      - name: staticcheck
        run: go run honnef.co/go/tools/cmd/staticcheck@latest ./...

      - name: Go tests
        run: go test ./...

      - name: Install Playwright Chromium
        run: cd web && bunx playwright install --with-deps chromium

      - name: End-to-end (real binary + headless Chromium)
        run: cd web && bun e2e/run.mjs

  # Every green push to main publishes a moving :edge image. Tagged releases
  # own :latest (see release.yml), so `docker pull` stays stable for everyone
  # else while :edge tracks main.
  docker-edge:
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    concurrency:
      group: edge-publish
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            BUILD_ID=edge-${{ github.sha }}
          tags: |
            ghcr.io/zandoh/hearth:edge
          labels: |
            org.opencontainers.image.source=https://github.com/zandoh/hearth
