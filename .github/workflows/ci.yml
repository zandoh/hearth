name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: oven-sh/setup-bun@v2

      - name: Frontend deps
        run: cd web && bun install --frozen-lockfile

      - name: Frontend lint, format, tests
        run: |
          cd web
          bun run lint
          bun run fmt:check
          bun test

      - name: Build binary (embeds frontend)
        run: make build

      - name: gofmt
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)

      - name: go vet
        run: go vet ./...

      - name: staticcheck
        run: go run honnef.co/go/tools/cmd/staticcheck@latest ./...

      - name: Go tests
        run: go test ./...

      - name: Install Playwright Chromium
        run: cd web && bunx playwright install --with-deps chromium

      - name: End-to-end (real binary + headless Chromium)
        run: cd web && bun e2e/run.mjs
