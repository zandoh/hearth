title: "[Q&A] "
labels: ["question"]
body:
  - type: textarea
    id: question
    attributes:
      label: The question
    validations:
      required: true
  - type: dropdown
    id: install
    attributes:
      label: How is Hearth running?
      options:
        - Docker (ghcr image)
        - Prebuilt binary
        - Built from source
        - Not running yet — deciding
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: v1.0.0
