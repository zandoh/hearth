# git-cliff config — generates release notes from conventional commits.
# Used by release.yml; run locally with `git cliff --latest`.
# https://git-cliff.org/docs/configuration

[changelog]
header = ""
# Tera template; HTML comments in group names control section order and are
# stripped on render.
body = """
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}*({{ commit.scope }})* {% endif %}\
            {% if commit.breaking %}[**breaking**] {% endif %}\
            {{ commit.message | upper_first }}\
    {% endfor %}
{% endfor %}\n
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = false
tag_pattern = "v[0-9].*"
sort_commits = "newest"
commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->Features" },
  { message = "^fix", group = "<!-- 1 -->Bug fixes" },
  { message = "^perf", group = "<!-- 2 -->Performance" },
  { message = "^refactor", group = "<!-- 3 -->Refactoring" },
  { message = "^docs", group = "<!-- 4 -->Documentation" },
  { message = "^test|^build|^ci|^chore", group = "<!-- 5 -->Maintenance" },
  { message = ".*", group = "<!-- 6 -->Other" },
]
