<!doctype html>
<html><head><meta charset="utf-8"><style>
  @font-face {
    font-family: "Space Grotesk";
    font-weight: 600;
    src: url("../node_modules/@fontsource/space-grotesk/files/space-grotesk-latin-600-normal.woff2") format("woff2");
  }
  @font-face {
    font-family: "Space Grotesk";
    font-weight: 400;
    src: url("../node_modules/@fontsource/space-grotesk/files/space-grotesk-latin-400-normal.woff2") format("woff2");
  }
  @font-face {
    font-family: "IBM Plex Mono";
    font-weight: 400;
    src: url("../node_modules/@fontsource/ibm-plex-mono/files/ibm-plex-mono-latin-400-normal.woff2") format("woff2");
  }
  * { margin: 0; box-sizing: border-box; }
  body {
    width: 1280px; height: 640px; overflow: hidden;
    background: #1B1916;
    font-family: "Space Grotesk", sans-serif;
    color: #F4F1EB;
    position: relative;
  }
  /* faint warm glow bottom-left, very subtle */
  .glow {
    position: absolute; left: -200px; bottom: -300px;
    width: 700px; height: 700px; border-radius: 50%;
    background: radial-gradient(circle, rgba(217,119,66,0.13), transparent 65%);
  }
  .content {
    position: absolute; left: 88px; top: 0; bottom: 0;
    width: 560px; display: flex; flex-direction: column; justify-content: center;
    gap: 28px; z-index: 2;
  }
  .lockup { display: flex; align-items: center; gap: 24px; }
  .lockup svg { width: 92px; height: 92px; }
  .wordmark { font-size: 88px; font-weight: 600; letter-spacing: -0.02em; }
  .tagline { font-size: 30px; font-weight: 400; color: #F4F1EB; line-height: 1.35; }
  .sub { font-size: 21px; color: #ABA79E; line-height: 1.5; max-width: 520px; }
  .repo {
    position: absolute; left: 92px; bottom: 56px;
    font-family: "IBM Plex Mono", monospace; font-size: 17px; color: #8A857B;
    z-index: 2;
  }
  .shot {
    position: absolute; right: -150px; top: 70px;
    width: 760px; z-index: 1;
    border-radius: 14px;
    border: 1px solid rgba(244,241,235,0.14);
    box-shadow: 0 30px 80px rgba(0,0,0,0.55);
    transform: rotate(-3deg);
    overflow: hidden;
  }
  .shot img { width: 100%; display: block; }
  .cta {
    display: none;
    align-self: flex-start;
    background: #D97742; color: #1B1916;
    font-weight: 600; font-size: 30px; letter-spacing: 0.01em;
    padding: 16px 34px; border-radius: 999px;
  }
  /* og variant: 1200x630 (1.91:1) with a call-to-action for link unfurls */
  body.og { width: 1200px; height: 630px; }
  body.og .content { width: 540px; left: 72px; gap: 22px; }
  body.og .wordmark { font-size: 76px; }
  body.og .lockup svg { width: 80px; height: 80px; }
  body.og .tagline { font-size: 26px; }
  body.og .sub { display: none; }
  body.og .cta { display: inline-block; }
  body.og .repo { left: 76px; bottom: 44px; }
  body.og .shot { width: 700px; right: -160px; top: 60px; }
</style></head>
<body>
  <div class="glow"></div>
  <div class="content">
    <div class="lockup">
      <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <g transform="translate(32 32) scale(1.35) translate(-32 -32)">
          <circle cx="32" cy="32" r="20" fill="none" stroke="#F4F1EB" stroke-width="4"/>
          <polygon points="32,22 41,30 41,41 23,41 23,30" fill="#D97742"/>
        </g>
      </svg>
      <span class="wordmark">hearth</span>
    </div>
    <div class="tagline">The quiet fire at the center of&nbsp;your&nbsp;home.</div>
    <div class="sub">A self-hosted widget board for the household — calendar, chores, groceries, meds — on the wall, in one Go binary.</div>
    <div class="cta">Try the live demo&nbsp;&nbsp;&rarr;</div>
  </div>
  <div class="repo">github.com/zandoh/hearth</div>
  <div class="shot"><img src="../../docs/board-dark.png"></div>
</body></html>
